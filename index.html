<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Order summary card</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <img class="bg__wave" src="./images/pattern-background-desktop.svg"/>

  <main>
    <header class="card__hero">
      <img class="card__hero-img" src="images/illustration-hero.svg" alt="Illustration hero image">
    </header>

    <article class="card__content">
      <section class="card__info">
        <h1 class="card__title">Order Summary</h1>

        <p class="card__desc">
          You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!
        </p>
      </section>

      <section class="card__pricing">
        <div class="card__price-info1">
        <img class="card__pricing-icon" src="images/icon-music.svg" alt="Music icon">

        <div class="card__price-info2">
          <p class="card__plan-label">Annual Plan</p>
          <p class="card__plan-price">$59.99/year</p>
        </div>
        </div>

        <p class="card__plan-change">Change</p>
      </section>

      <section class="card__plan-btn">
        <button class="card__proceed-btn">Proceed to Payment</button>
        <p class="card__cancel-btn" role="button">Cancel Order</p>
      </section>
    </article>
  </main>
</body>
</html>
